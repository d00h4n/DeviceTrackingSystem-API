<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Device Tracking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Company Device Tracking</span>
        </div>
    </nav>

    <div class="container">
        <!-- Area Metrik Dasbor -->
        <div class="row mb-4 text-center">
            <div class="col-6 col-md-3 mb-2">
                <div class="card bg-primary text-white shadow-sm"><div class="card-body">
                    <h5 class="card-title">Total Devices</h5><h2 id="totalDevices">0</h2>
                </div></div>
            </div>
            <div class="col-6 col-md-3 mb-2">
                <div class="card bg-success text-white shadow-sm"><div class="card-body">
                    <h5 class="card-title">Assigned</h5><h2 id="assignedDevices">0</h2>
                </div></div>
            </div>
            <div class="col-6 col-md-3 mb-2">
                <div class="card bg-warning text-dark shadow-sm"><div class="card-body">
                    <h5 class="card-title">Unassigned</h5><h2 id="unassignedDevices">0</h2>
                </div></div>
            </div>
            <div class="col-6 col-md-3 mb-2">
                <div class="card bg-danger text-white shadow-sm"><div class="card-body">
                    <h5 class="card-title">In Repair</h5><h2 id="inRepair">0</h2>
                </div></div>
            </div>
        </div>

        <!-- Tombol Tambah, Search, Filter, dan Export CSV -->
        <div class="mb-3 d-flex flex-column flex-md-row justify-content-between gap-2">
            <button class="btn btn-success" onclick="openModal()">+ Add New Device</button>
            <div class="d-flex flex-column flex-md-row gap-2">
                <input type="text" id="searchInput" class="form-control" placeholder="Search name or employee..." onkeyup="filterDevices()">
                <select id="filterStatus" class="form-select" onchange="filterDevices()">
                    <option value="All">All Status</option>
                    <option value="Active">Active</option>
                    <option value="Borrowed">Borrowed</option>
                    <option value="In Repair">In Repair</option>
                    <option value="Unassigned">Unassigned</option>
                </select>
                <button class="btn btn-outline-success" onclick="exportCSV()">Export CSV</button>
            </div>
        </div>

        <!-- Tabel Daftar Perangkat -->
        <div class="card shadow-sm mb-5">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Assigned To</th>
                                <th>Status</th>
                                <th>Last Checked</th>
                                <th>Notes</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="deviceTableBody">
                            <!-- Data dimuat di sini -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Form Tambah/Edit -->
    <div class="modal fade" id="deviceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Device Form</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="deviceId">
                    <div class="mb-3">
                        <label class="form-label">Device Name</label>
                        <input type="text" class="form-control" id="deviceName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Device Type</label>
                        <input type="text" class="form-control" id="deviceType" placeholder="e.g. Laptop, Phone" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Assigned Employee</label>
                        <input type="text" class="form-control" id="assignedEmployee" placeholder="Leave blank if unassigned">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select class="form-select" id="deviceStatus">
                            <option value="Active">Active</option>
                            <option value="Borrowed">Borrowed</option>
                            <option value="In Repair">In Repair</option>
                            <option value="Unassigned">Unassigned</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notes</label>
                        <textarea class="form-control" id="deviceNotes"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveDevice()">Save Device</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const deviceModal = new bootstrap.Modal(document.getElementById('deviceModal'));
        let isEditMode = false;
        let currentDevices = []; // Menyimpan data sementara untuk filter & export

        async function loadDashboard() {
            const response = await fetch('/api/devices');
            const data = await response.json();
            
            document.getElementById('totalDevices').innerText = data.dashboardMetrics.totalDevices;
            document.getElementById('assignedDevices').innerText = data.dashboardMetrics.assignedDevices;
            document.getElementById('unassignedDevices').innerText = data.dashboardMetrics.unassignedDevices;
            document.getElementById('inRepair').innerText = data.dashboardMetrics.inRepair;

            currentDevices = data.devicesList;
            filterDevices(); // Panggil fungsi filter untuk merender tabel pertama kali
        }

        // Fungsi Bonus: Pencarian dan Filter
        function filterDevices() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const filterStatus = document.getElementById('filterStatus').value;

            const filteredData = currentDevices.filter(d => {
                const matchName = d.deviceName.toLowerCase().includes(searchText) || (d.assignedEmployee && d.assignedEmployee.toLowerCase().includes(searchText));
                const matchStatus = filterStatus === 'All' || d.status === filterStatus;
                return matchName && matchStatus;
            });

            renderTable(filteredData);
        }

        function renderTable(devices) {
            const tbody = document.getElementById('deviceTableBody');
            tbody.innerHTML = '';
            devices.forEach(device => {
                let badgeColor = 'secondary';
                if(device.status === 'Active') badgeColor = 'success';
                else if(device.status === 'In Repair') badgeColor = 'danger';
                else if(device.status === 'Borrowed') badgeColor = 'info';
                else if(device.status === 'Unassigned') badgeColor = 'warning text-dark';

                const dateObj = new Date(device.lastCheckedDate);
                const formattedDate = dateObj.toLocaleDateString('en-GB') + ' ' + dateObj.toLocaleTimeString('en-GB', {hour: '2-digit', minute:'2-digit'});

                tbody.innerHTML += `
                    <tr>
                        <td>${device.deviceName}</td>
                        <td>${device.deviceType}</td>
                        <td>${device.assignedEmployee || '-'}</td>
                        <td><span class="badge bg-${badgeColor}">${device.status}</span></td>
                        <td>${formattedDate}</td>
                        <td>${device.notes || '-'}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick='openModal(${JSON.stringify(device)})'>Edit</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteDevice(${device.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        function openModal(device = null) {
            isEditMode = !!device;
            document.getElementById('modalTitle').innerText = isEditMode ? 'Edit Device' : 'Add New Device';
            document.getElementById('deviceId').value = device ? device.id : '';
            document.getElementById('deviceName').value = device ? device.deviceName : '';
            document.getElementById('deviceType').value = device ? device.deviceType : '';
            document.getElementById('assignedEmployee').value = device && device.assignedEmployee ? device.assignedEmployee : '';
            document.getElementById('deviceStatus').value = device ? device.status : 'Unassigned';
            document.getElementById('deviceNotes').value = device && device.notes ? device.notes : '';
            deviceModal.show();
        }

        async function saveDevice() {
            const deviceData = {
                id: document.getElementById('deviceId').value ? parseInt(document.getElementById('deviceId').value) : 0,
                deviceName: document.getElementById('deviceName').value,
                deviceType: document.getElementById('deviceType').value,
                assignedEmployee: document.getElementById('assignedEmployee').value || null,
                status: document.getElementById('deviceStatus').value,
                notes: document.getElementById('deviceNotes').value
            };

            const url = isEditMode ? `/api/devices/${deviceData.id}` : '/api/devices';
            const method = isEditMode ? 'PUT' : 'POST';

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(deviceData)
            });

            deviceModal.hide();
            loadDashboard();
        }

        async function deleteDevice(id) {
            if(confirm('Are you sure you want to delete this device?')) {
                await fetch(`/api/devices/${id}`, { method: 'DELETE' });
                loadDashboard();
            }
        }

        // Fungsi Bonus: Export ke CSV
        function exportCSV() {
            if (currentDevices.length === 0) {
                alert("No data to export!");
                return;
            }
            
            let csv = 'ID,Name,Type,Assigned To,Status,Last Checked,Notes\n';
            currentDevices.forEach(d => {
                const dateObj = new Date(d.lastCheckedDate);
                const formattedDate = dateObj.toLocaleDateString('en-GB') + ' ' + dateObj.toLocaleTimeString('en-GB', {hour: '2-digit', minute:'2-digit'});
                
                // Menghindari error jika ada tanda koma atau kutip pada catatan
                const notes = d.notes ? `"${d.notes.replace(/"/g, '""')}"` : '""';
                const emp = d.assignedEmployee ? `"${d.assignedEmployee}"` : '""';
                
                csv += `${d.id},"${d.deviceName}","${d.deviceType}",${emp},"${d.status}","${formattedDate}",${notes}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'device_tracking_export.csv');
            a.click();
        }

        loadDashboard();
    </script>
</body>
</html>
